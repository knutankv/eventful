<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Group colors ─────────────────────────────────────────────
const GROUP_COLORS = [
  '#f97316','#22c55e','#38bdf8','#a78bfa',
  '#f43f5e','#facc15','#2dd4bf','#fb7185',
  '#60a5fa','#34d399','#e879f9','#fbbf24',
];
function groupColor(group) {
  if (!group) return null;
  let hash = 0;
  for (let i = 0; i < group.length; i++) hash = group.charCodeAt(i) + ((hash << 5) - hash);
  return GROUP_COLORS[Math.abs(hash) % GROUP_COLORS.length];
}

// ─── Palette ────────────────────────────────────────────────
const C = {
  bg:          '#0d1117',
  surface:     '#161b22',
  surface2:    '#21262d',
  green:       '#22c55e',
  greenDim:    'rgba(34,197,94,0.13)',
  greenBright: '#4ade80',
  greenBorder: 'rgba(34,197,94,0.28)',
  text:        '#f0f6fc',
  textMuted:   '#7d8590',
  textDim:     '#3a4149',
  red:         '#f85149',
  redDim:      'rgba(248,81,73,0.12)',
  redBorder:   'rgba(248,81,73,0.3)',
  border:      'rgba(255,255,255,0.07)',
  tabBar:      'rgba(10,13,18,0.94)',
};


// ─── Helpers ─────────────────────────────────────────────────
const pad2 = n => String(n).padStart(2,'0');
function fmtTime(iso) {
  const d = new Date(iso);
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
}
function fmtRelative(iso) {
  const diff = (Date.now() - new Date(iso)) / 60000;
  if (diff < 1)    return 'Just now';
  if (diff < 60)   return `${Math.floor(diff)}m ago`;
  if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
  return new Date(iso).toLocaleDateString([], { month:'short', day:'numeric' });
}
function fmtDateShort(iso) {
  const d = new Date(iso), t = new Date();
  if (d.toDateString() === t.toDateString()) return 'Today';
  return d.toLocaleDateString([], { month:'short', day:'numeric' });
}

// ─── Icons (inline SVG) ──────────────────────────────────────
const Ic = {
  list:    (c='currentColor') => <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
  search:  (c='currentColor') => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  plus:    (c='currentColor') => <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  gear:    (c='currentColor') => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  back:    (c='currentColor') => <svg width="11" height="18" viewBox="0 0 11 18" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 1L1 9l8 8"/></svg>,
  chevD:   (c='currentColor') => <svg width="12" height="8"  viewBox="0 0 12 8"  fill="none" stroke={c} strokeWidth="2"   strokeLinecap="round"><path d="M1 1l5 5 5-5"/></svg>,
  chevR:   (c='currentColor') => <svg width="8"  height="12" viewBox="0 0 8 12"  fill="none" stroke={c} strokeWidth="2"   strokeLinecap="round"><path d="M1 1l5 5-5 5"/></svg>,
  trash:   (c='currentColor') => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"   strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>,
  upload:  (c='currentColor') => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"   strokeLinecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  check:   (c='currentColor') => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="3"   strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
  clock:   (c='currentColor') => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"   strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
};

// ─── Reusable: Press-flash hook ──────────────────────────────
function useFlash(ms=550) {
  const [on, setOn] = useState(false);
  const fire = useCallback(() => { setOn(true); setTimeout(()=>setOn(false), ms); }, [ms]);
  return [on, fire];
}

// ─── Record Dot Button ───────────────────────────────────────
function RecordDot({ onPress, size=42 }) {
  const [pressed, setPressed] = useState(false);
  return (
    <button
      onPointerDown={e=>{e.stopPropagation();setPressed(true);}}
      onPointerUp={e=>{e.stopPropagation();setPressed(false);onPress();}}
      onPointerLeave={()=>setPressed(false)}
      onClick={e=>e.stopPropagation()}
      style={{
        width:size, height:size, borderRadius:'50%',
        border:`2px solid ${C.green}`,
        background: pressed ? C.green : C.greenDim,
        display:'flex', alignItems:'center', justifyContent:'center',
        cursor:'pointer', flexShrink:0,
        transform: pressed ? 'scale(0.88)' : 'scale(1)',
        transition:'transform 0.1s, background 0.1s',
        WebkitTapHighlightColor:'transparent',
      }}
    >
      <div style={{
        width:size*0.36, height:size*0.36, borderRadius:'50%',
        background: pressed ? '#fff' : C.green,
        transition:'background 0.1s',
      }}/>
    </button>
  );
}

// ─── Item Row — standard ─────────────────────────────────────
function ItemRow({ item, onRecord, onSelect, style:rowStyle={} }) {
  const [flash, fireFlash] = useFlash();
  const valid = item.timestamps.filter(t=>t.valid);
  const last  = valid[0];
  const gc    = groupColor(item.group);
  return (
    <div
      style={{
        display:'flex', alignItems:'center', gap:12,
        padding:'11px 16px',
        paddingLeft: gc ? 12 : 16,
        background: flash ? 'rgba(34,197,94,0.07)' : 'transparent',
        borderBottom:`1px solid ${C.border}`,
        borderLeft: gc ? `4px solid ${gc}` : 'none',
        transition:'background 0.35s',
        ...rowStyle,
      }}
    >
      <div onClick={()=>onSelect(item)} style={{ flex:1, minWidth:0, cursor:'pointer' }}>
        <div style={{ fontSize:15, fontWeight:600, color:C.text, letterSpacing:-0.2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:6 }}>
          {item.id}{item.group && <span style={{fontSize:10,fontWeight:700,color:gc||C.textDim,background:`${gc}1a`,borderRadius:5,padding:'1px 6px',flexShrink:0,border:`1px solid ${gc}44`}}>{item.group}</span>}
        </div>
        <div style={{ fontSize:12, color: last ? C.textMuted : C.textDim, marginTop:2, display:'flex', alignItems:'center', gap:5 }}>
          {last
            ? <><span style={{color:C.green, fontVariantNumeric:'tabular-nums'}}>{fmtTime(last.iso)}</span><span style={{color:C.textDim}}>·</span>{fmtRelative(last.iso)}</>
            : 'No records'}
          {valid.length > 1 &&
            <span style={{
              background:C.greenDim, color:C.green, borderRadius:6,
              padding:'0 5px', fontSize:11, fontWeight:600, letterSpacing:0.1,
              lineHeight:'16px',
            }}>{valid.length}</span>
          }
        </div>
      </div>
      <RecordDot onPress={()=>{ fireFlash(); onRecord(item.id); }} size={40}/>
    </div>
  );
}

// ─── Item Row — card variant ─────────────────────────────────
function ItemCard({ item, onRecord, onSelect }) {
  const [flash, fireFlash] = useFlash();
  const valid = item.timestamps.filter(t=>t.valid);
  const last  = valid[0];
  const gc    = groupColor(item.group);
  return (
    <div
      style={{
        background: flash ? 'rgba(34,197,94,0.09)' : C.surface,
        border:`1px solid ${flash ? C.greenBorder : C.border}`,
        borderLeft: gc ? `4px solid ${gc}` : `1px solid ${flash ? C.greenBorder : C.border}`,
        borderRadius:18, padding:'14px 16px',
        display:'flex', alignItems:'center', gap:14,
        transition:'background 0.35s, border-color 0.35s',
      }}
    >
      <div onClick={()=>onSelect(item)} style={{ flex:1, minWidth:0, cursor:'pointer' }}>
        <div style={{ fontSize:16, fontWeight:700, color:C.text, letterSpacing:-0.3, display:'flex', alignItems:'center', gap:6 }}>{item.id}{item.group && <span style={{fontSize:10,fontWeight:700,color:gc,background:`${gc}1a`,borderRadius:5,padding:'1px 6px',flexShrink:0,border:`1px solid ${gc}44`}}>{item.group}</span>}</div>
        <div style={{ fontSize:12, color: last ? C.green : C.textDim, marginTop:4, display:'flex', alignItems:'center', gap:5 }}>
          {last
            ? <>{Ic.clock(C.textDim)}{fmtRelative(last.iso)}{valid.length > 1 && <span style={{color:C.textDim}}>+{valid.length-1}</span>}</>
            : 'No records yet'}
        </div>
        {item.sensors.length > 0 &&
          <div style={{ marginTop:6, display:'flex', gap:4, flexWrap:'wrap' }}>
            {item.sensors.map(s=>(
              <span key={s.id} style={{ fontSize:11, background:'rgba(34,197,94,0.08)', color:C.green, padding:'2px 7px', borderRadius:6, border:`1px solid ${C.greenBorder}`, fontWeight:500 }}>{s.id}</span>
            ))}
          </div>
        }
      </div>
      <RecordDot onPress={()=>{ fireFlash(); onRecord(item.id); }} size={46}/>
    </div>
  );
}

// ─── Item Row — minimal ──────────────────────────────────────
function ItemMinimal({ item, onRecord, onSelect }) {
  const [flash, fireFlash] = useFlash();
  const valid = item.timestamps.filter(t=>t.valid);
  const last  = valid[0];
  const gc    = groupColor(item.group);
  return (
    <div
      style={{
        display:'flex', alignItems:'center',
        padding:'8px 16px',
        paddingLeft: gc ? 12 : 16,
        background: flash ? 'rgba(34,197,94,0.06)' : 'transparent',
        borderBottom:`1px solid ${C.border}`,
        borderLeft: gc ? `4px solid ${gc}` : 'none',
        transition:'background 0.3s',
        minHeight:48,
      }}
    >
      <div onClick={()=>onSelect(item)} style={{ flex:1, display:'flex', alignItems:'center', gap:12, minWidth:0, cursor:'pointer' }}>
        <span style={{ fontSize:14, fontWeight:600, color:C.text, letterSpacing:-0.2, flex:'0 0 auto', maxWidth:'55%', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.id}</span>
        <span style={{ fontSize:12, color: last ? C.textMuted : C.textDim, fontVariantNumeric:'tabular-nums', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
          {last ? fmtTime(last.iso) : '—'}
          {valid.length > 1 && <span style={{color:C.textDim, marginLeft:5}}>{valid.length}×</span>}
        </span>
      </div>
      <RecordDot onPress={()=>{ fireFlash(); onRecord(item.id); }} size={34}/>
    </div>
  );
}

// ─── Detail Screen ───────────────────────────────────────────
function DetailScreen({ item, onBack, onRecord, onUpdateItem, sensorsList=[] }) {
  const [tsExpanded,   setTsExpanded]   = useState(true);
  const [sensExpanded, setSensExpanded] = useState(item.sensors.length > 0);

  // Auto-expand sensors section if sensors are added (e.g. via import)
  useEffect(() => {
    if (item.sensors.length > 0) setSensExpanded(true);
  }, [item.sensors.length]);
  const [flash, fireFlash] = useFlash(400);
  const [selSensor, setSelSensor] = useState('');

  const recordNow = () => { fireFlash(); onRecord(item.id); };

  const toggleValid = idx => {
    const ts = [...item.timestamps];
    ts[idx] = { ...ts[idx], valid: !ts[idx].valid };
    onUpdateItem({ ...item, timestamps: ts });
  };

  const addSensor = () => {
    if (!selSensor || item.sensors.find(s=>s.id===selSensor)) return;
    onUpdateItem({ ...item, sensors:[...item.sensors,{id:selSensor,comment:''}] });
    setSelSensor('');
  };

  const removeSensor = sid => onUpdateItem({ ...item, sensors: item.sensors.filter(s=>s.id!==sid) });

  const updateComment = (sid,v) => onUpdateItem({ ...item, sensors: item.sensors.map(s=>s.id===sid?{...s,comment:v}:s) });

  const valid   = item.timestamps.filter(t=>t.valid);
  const invalid = item.timestamps.filter(t=>!t.valid);
  const gc      = groupColor(item.group);

  return (
    <div style={{ height:'100%', overflowY:'auto', background:C.bg }}>
      {/* Status bar spacer */}
      <div style={{ height:60 }}/>

      {/* Nav */}
      <div style={{ padding:'4px 20px 12px', display:'flex', alignItems:'center', gap:8 }}>
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', color:C.green, display:'flex', alignItems:'center', gap:6, fontSize:16, fontWeight:500, padding:'4px 0' }}>
          {Ic.back(C.green)} <span>Items</span>
        </button>
      </div>

      {/* Title */}
      <div style={{ padding:'0 20px 24px' }}>
        <div style={{ fontSize:30, fontWeight:800, color:C.text, letterSpacing:-0.7, display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
          {item.id}
          {item.group && <span style={{ fontSize:13, fontWeight:700, color:gc, background:`${gc}1a`, borderRadius:8, padding:'3px 10px', border:`1px solid ${gc}44` }}>{item.group}</span>}
        </div>
        <div style={{ fontSize:13, color:C.textMuted, marginTop:5, display:'flex', gap:12 }}>
          <span>{valid.length} valid timestamp{valid.length!==1?'s':''}</span>
          {invalid.length>0 && <span style={{color:C.red}}>{invalid.length} invalid</span>}
          {item.sensors.length>0 && <span>{item.sensors.length} sensor{item.sensors.length!==1?'s':''}</span>}
        </div>
      </div>

      {/* Record button */}
      <div style={{ padding:'0 20px 28px' }}>
        <button
          onClick={recordNow}
          style={{
            width:'100%', height:62, borderRadius:22,
            background: flash ? C.greenBright : C.green,
            border:'none', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center', gap:10,
            fontSize:17, fontWeight:700, color:'#0a120d',
            transform: flash ? 'scale(0.96)' : 'scale(1)',
            transition:'all 0.12s',
            letterSpacing:-0.3,
          }}
        >
          <div style={{ width:10, height:10, borderRadius:'50%', background:'rgba(0,0,0,0.5)' }}/>
          Record Timestamp
        </button>
        {flash &&
          <div style={{ textAlign:'center', fontSize:12, color:C.green, marginTop:8, fontVariantNumeric:'tabular-nums', fontWeight:500 }}>
            {fmtTime(new Date().toISOString())} recorded
          </div>
        }
      </div>

      {/* Timestamps section */}
      <div style={{ padding:'0 16px 20px' }}>
        <button
          onClick={()=>setTsExpanded(e=>!e)}
          style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', background:'none', border:'none', cursor:'pointer', padding:'0 4px 10px', gap:8 }}
        >
          <span style={{ fontSize:12, fontWeight:700, color:C.textMuted, textTransform:'uppercase', letterSpacing:0.8 }}>Timestamps</span>
          <span style={{ color:C.textDim, display:'inline-flex', transform: tsExpanded?'rotate(0)':'rotate(-90deg)', transition:'transform 0.2s' }}>{Ic.chevD()}</span>
        </button>
        {tsExpanded && (
          <div style={{ background:C.surface, borderRadius:18, overflow:'hidden', border:`1px solid ${C.border}` }}>
            {item.timestamps.length === 0 &&
              <div style={{ padding:'24px 16px', textAlign:'center', color:C.textDim, fontSize:14 }}>
                No timestamps recorded yet
              </div>
            }
            {item.timestamps.map((ts,ri)=>(
                <div
                  key={ri}
                  style={{
                    display:'flex', alignItems:'center', gap:12,
                    padding:'12px 16px',
                    borderBottom: ri < item.timestamps.length-1 ? `1px solid ${C.border}` : 'none',
                    opacity: ts.valid ? 1 : 0.45,
                  }}
                >
                  <div style={{ flex:1 }}>

                </div>
                <input
                  type="text"
                  placeholder="Add comment..."
                  defaultValue={s.comment}

                />
              </div>
            ))}
            <div style={{ display:'flex', gap:8 }}>
              <select
                value={selSensor}
                onChange={e=>setSelSensor(e.target.value)}
                style={{ flex:1, background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:'10px 12px', color: selSensor?C.text:C.textMuted, fontSize:14, outline:'none' }}

                <option value="">Select sensor…</option>
                {sensorsList.filter(s=>!item.sensors.find(ss=>ss.id===s)).map(s=><option key={s} value={s}>{s}</option>)}

                onClick={addSensor}
                disabled={!selSensor}
                style={{ height:44, paddingInline:18, borderRadius:12, border:'none', cursor: selSensor?'pointer':'default', background: selSensor?C.green:C.surface2, color: selSensor?'#0a120d':C.textDim, fontWeight:700, fontSize:14, transition:'all 0.15s' }}

// ─── Add Screen ───────────────────────────────────────────────
function AddScreen({ items, onAdd, sensors, onImportItems, onImportJSON, onImportSensors, onImportSensorDefaults }) {
  const [val,    setVal]    = useState('');
  const [done,   setDone]   = useState('');
  const [notice, setNotice] = useState('');
  const [err,    setErr]    = useState('');
  const txtRef     = useRef();
  const jsonRef    = useRef();
  const sensorRef  = useRef();
  const defRef     = useRef();

  const flash = (msg) => { setNotice(msg); setTimeout(()=>setNotice(''), 2400); };

  const submit = () => {
    const id = val.trim();
    if (!id) return;
    if (items.find(i=>i.id===id)) { setErr(`"${id}" already exists`); return; }
    onAdd(id);
    flash(`"${id}" added`); setVal(''); setErr('');
  };

  const handleTxtFile = e => {
    const file = e.target.files[0]; if (!file) return;
    onImportItems(file);
    flash(`Importing IDs from ${file.name}…`);
    e.target.value = '';
  };

  const handleJsonFile = e => {
    const file = e.target.files[0]; if (!file) return;
    onImportJSON(file);
    flash(`Importing data from ${file.name}…`);
    e.target.value = '';
  };

  const handleSensorFile = e => {
    const file = e.target.files[0]; if (!file) return;
    onImportSensors(file);
    flash(`Importing sensors from ${file.name}…`);
    e.target.value = '';
  };

  const handleDefFile = e => {
    const file = e.target.files[0]; if (!file) return;
    onImportSensorDefaults(file);
    flash(`Applying sensor defaults from ${file.name}…`);
    e.target.value = '';
  };

  const ImportZone = ({ label, sub, accept, inputRef, onChange }) => (
    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
      <label style={{ fontSize:11, fontWeight:700, color:C.textMuted, textTransform:'uppercase', letterSpacing:0.8, paddingLeft:4 }}>{label}</label>
      <div
        onClick={()=>inputRef.current?.click()}
        style={{ background:C.surface, border:`1px dashed rgba(255,255,255,0.12)`, borderRadius:16, padding:'20px 16px', textAlign:'center', color:C.textMuted, fontSize:14, lineHeight:1.6, display:'flex', flexDirection:'column', alignItems:'center', gap:8, cursor:'pointer' }}
      >
        <span style={{ color:C.green, display:'inline-flex' }}>{Ic.upload(C.green)}</span>
        <div>{sub}</div>
      </div>
      <input ref={inputRef} type="file" accept={accept} onChange={onChange} style={{ display:'none' }}/>
    </div>
  );

  return (
    <div style={{ height:'100%', overflowY:'auto' }}>
      <div style={{ height:60 }}/>
      <div style={{ padding:'12px 20px 20px' }}>
        <div style={{ fontSize:30, fontWeight:800, color:C.text, letterSpacing:-0.7 }}>Add Items</div>
        <div style={{ fontSize:14, color:C.textMuted, marginTop:6 }}>Manually or import from file</div>
      </div>

      {notice &&
        <div style={{ margin:'0 16px 14px', background:C.greenDim, border:`1px solid ${C.greenBorder}`, borderRadius:14, padding:'11px 16px', display:'flex', alignItems:'center', gap:8, color:C.green, fontSize:14, fontWeight:600 }}>
          {Ic.check(C.green)} {notice}
        </div>
      }

      {/* Manual entry */}
      <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:10, marginBottom:24 }}>
        <label style={{ fontSize:11, fontWeight:700, color:C.textMuted, textTransform:'uppercase', letterSpacing:0.8, paddingLeft:4 }}>Item ID</label>
        <input type="text" placeholder="e.g. BRG-005" value={val} onChange={e=>{setVal(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&submit()}
          style={{ background:C.surface, border:`1px solid ${err?C.redBorder:C.border}`, borderRadius:14, padding:'14px 16px', color:C.text, fontSize:16, outline:'none', width:'100%' }}/>
        {err && <div style={{ fontSize:12, color:C.red, paddingLeft:4 }}>{err}</div>}
        <button onClick={submit} disabled={!val.trim()} style={{ height:52, borderRadius:16, border:'none', cursor:val.trim()?'pointer':'default', background:val.trim()?C.green:C.surface2, color:val.trim()?'#0a120d':C.textDim, fontWeight:700, fontSize:16, transition:'all 0.15s' }}>
          Add Item
        </button>
      </div>

      <div style={{ height:1, background:C.border, margin:'0 16px 24px' }}/>

      {/* Import zones */}
      <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:16, paddingBottom:100 }}>
        <ImportZone
          label="Import IDs (.txt)"
          sub={<>One ID per line, optionally <code style={{color:C.text,fontSize:11}}>ID, Group</code></>}
          accept=".txt,text/plain"
          inputRef={txtRef}
          onChange={handleTxtFile}
        />
        <ImportZone
          label="Import Sensors (.txt)"
          sub="One sensor name per line"
          accept=".txt,text/plain"
          inputRef={sensorRef}
          onChange={handleSensorFile}
        />
        <ImportZone
          label="Import Sensor Defaults (.txt)"
          sub={<><code style={{color:C.text,fontSize:11}}>ItemID, SensorID, comment</code> — pre-assigns sensors</>}
          accept=".txt,text/plain"
          inputRef={defRef}
          onChange={handleDefFile}
        />
        <ImportZone
          label="Import full dataset (.json)"
          sub="Restores items, timestamps &amp; sensors"
          accept=".json,application/json"
          inputRef={jsonRef}
          onChange={handleJsonFile}
        />
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:16, padding:'14px 16px' }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.textMuted, textTransform:'uppercase', letterSpacing:0.6, marginBottom:10 }}>Current sensor list ({sensors.length})</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {sensors.map(s => (

            ))}
            {sensors.length === 0 && <span style={{ fontSize:13, color:C.textDim }}>No sensors defined</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App root ─────────────────────────────────────────────────
function EventfulApp({ variant }) {
  const [items, setItems] = useState(()=>{
    try { const s=localStorage.getItem('ef_items_v2'); return s?JSON.parse(s):[]; } catch { return []; }
  });
  const [sensors, setSensors] = useState(()=>{
    try { const s=localStorage.getItem('ef_sensors'); return s?JSON.parse(s):[]; } catch { return []; }
  });
  const [tab,    setTab]    = useState('items');
  const [detail, setDetail] = useState(null);

  useEffect(()=>{ localStorage.setItem('ef_items_v2',JSON.stringify(items)); },[items]);
  useEffect(()=>{ localStorage.setItem('ef_sensors',JSON.stringify(sensors)); },[sensors]);

  const recordTimestamp = id => {
    const ts = { iso: new Date().toISOString(), valid:true };
    setItems(prev => prev.map(i => i.id===id ? { ...i, timestamps:[ts,...i.timestamps] } : i));
    if (detail?.id===id) setDetail(d=>({ ...d, timestamps:[ts,...d.timestamps] }));
  };

  const updateItem = updated => {
    setItems(prev=>prev.map(i=>i.id===updated.id?updated:i));
    setDetail(updated);
  };

  const addItem = (id, group='') => {
    if (items.find(i=>i.id===id)) return;
    setItems(prev=>[...prev, { id, group, timestamps:[], sensors:[] }]);
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ items, sensors },null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `eventful-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };

  const importJSON = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        // Support both {items, sensors} format and bare array
        if (Array.isArray(data)) {
          setItems(data);
        } else {
          if (data.items)   setItems(data.items);
          if (data.sensors) setSensors(data.sensors);
        }
      } catch { alert('Invalid JSON file'); }
    };
    reader.readAsText(file);
  };

  const importSensors = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
      const names = e.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
      setSensors(names);
    };
    reader.readAsText(file);
  };

  const importSensorDefaults = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
      const lines = e.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
      // Format: {itemId}, {sensorId}, {comment}
      const assignments = lines.map(line => {
        const parts = line.split(', ');
        if (parts.length < 2) return null;
        // itemId may contain spaces but not ', '
        const itemId   = parts[0].trim();
        const sensorId = parts[1].trim();
        const comment  = parts.slice(2).join(', ').trim();
        return { itemId, sensorId, comment };
      }).filter(Boolean);

      setItems(prev => prev.map(item => {
        const defs = assignments.filter(a => a.itemId === item.id);
        if (!defs.length) return item;
        const updatedSensors = [...item.sensors];
        defs.forEach(({ sensorId, comment }) => {
          if (!updatedSensors.find(s => s.id === sensorId)) {
            updatedSensors.push({ id: sensorId, comment });
          }
        });
        return { ...item, sensors: updatedSensors };
      }));

      // Also add any new sensor names to the sensor list
      const sensorNames = [...new Set(assignments.map(a => a.sensorId))];
      setSensors(prev => {
        const merged = [...prev];
        sensorNames.forEach(n => { if (!merged.includes(n)) merged.push(n); });
        return merged;
      });
    };
    reader.readAsText(file);
  };

  const handleSelect = item => {
    const latest = items.find(i=>i.id===item.id)||item;
    setDetail(latest);
  };

  return (
    <div style={{ height:'100%', position:'relative', background:C.bg, overflow:'hidden' }}>
      {/* Detail overlay — slides in */}
      {detail && (
        <div style={{ position:'absolute', inset:0, zIndex:50, background:C.bg }}>
          <DetailScreen
            item={items.find(i=>i.id===detail.id)||detail}
            sensorsList={sensors}
            onBack={()=>setDetail(null)}
            onRecord={recordTimestamp}
            onUpdateItem={updateItem}
          />
        </div>
      )}

      {tab==='items'    && <ItemsTab    items={items} onRecord={recordTimestamp} onSelect={handleSelect} variant={variant}/>}
      {tab==='search'   && <SearchScreen items={items} onRecord={recordTimestamp} onSelect={handleSelect} variant={variant}/>}
      {tab==='add'      && <AddScreen    items={items} onAdd={addItem} sensors={sensors} onImportSensorDefaults={importSensorDefaults} onImportItems={file=>{ const r=new FileReader(); r.onload=e=>{ const lines=e.target.result.split('\n').map(l=>l.trim()).filter(Boolean); const newItems=lines.map(line=>{ const parts=line.split(', '); const id=parts[0].trim(); const group=parts[1]?.trim()||''; return id?{id,group,timestamps:[],sensors:[]}:null; }).filter(Boolean); setItems(newItems); }; r.readAsText(file); }} onImportJSON={importJSON} onImportSensors={importSensors}/>}
      {tab==='settings' && <SettingsScreen items={items} sensors={sensors} onExport={exportJSON} onImportJSON={importJSON} onImportSensors={importSensors} onImportSensorDefaults={importSensorDefaults} onResetTimestamps={()=>setItems(prev=>prev.map(i=>({...i,timestamps:[]})))} onResetAll={()=>setItems([])}/>}

      <TabBar tab={tab} setTab={t => { setDetail(null); setTab(t); }}/>
    </div>
  );
}

// ─── Tweaks + Root ────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "default"
}/*EDITMODE-END*/;

function Root() {
  const [tweaks,     setTweaks]     = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(()=>{
    const handler = e => {
      if (e.data?.type==='__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return ()=>window.removeEventListener('message', handler);
  },[]);

  const setTweak = (k,v) => {
    setTweaks(p=>{ const n={...p,[k]:v}; window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*'); return n; });
  };

  const opts = [
    { value:'default', label:'Standard rows',      desc:'Compact list, green dot indicator' },
    { value:'card',    label:'Card layout',         desc:'Elevated cards, sensor chips visible' },
    { value:'minimal', label:'Ultra-dense / minimal', desc:'Maximum items visible, tabular time' },
  ];

  return (
    <div style={{ width:'100%', height:'100vh', background:C.bg, position:'relative', overflow:'hidden' }}>
      <EventfulApp variant={tweaks.variant}/>

      {showTweaks && (
        <div style={{
          position:'fixed', bottom:24, right:24,
          background:'#141920', border:'1px solid rgba(255,255,255,0.09)',
          borderRadius:22, padding:20, width:230, zIndex:9999,
          boxShadow:'0 12px 40px rgba(0,0,0,0.6)',
        }}>
          <div style={{ fontSize:11, fontWeight:800, color:'#7d8590', textTransform:'uppercase', letterSpacing:1, marginBottom:14 }}>Tweaks</div>
          <div style={{ fontSize:11, color:'#7d8590', fontWeight:700, textTransform:'uppercase', letterSpacing:0.6, marginBottom:8 }}>List Style</div>
          {opts.map(o=>(
            <button
              key={o.value}
              onClick={()=>setTweak('variant',o.value)}
              style={{
                display:'block', width:'100%', textAlign:'left',
                padding:'9px 12px', borderRadius:12, border:'none', marginBottom:5,
                background: tweaks.variant===o.value ? 'rgba(34,197,94,0.13)' : 'transparent',
                cursor:'pointer',
              }}
            >
              <div style={{ fontSize:14, fontWeight: tweaks.variant===o.value?700:500, color: tweaks.variant===o.value?C.green:'#7d8590', marginBottom:2 }}>{o.label}</div>
              <div style={{ fontSize:11, color:'#484f58' }}>{o.desc}</div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
