<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Stride — Running App</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #050508; display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; }
  ::-webkit-scrollbar { display: none; }
  input, button, select { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Palette ──────────────────────────────────────────────────
const C = {
  bg:        '#0a0a0f',
  surface:   '#13131a',
  surface2:  '#1c1c26',
  orange:    '#f97316',
  orangeDim: 'rgba(249,115,22,0.13)',
  orangeBorder: 'rgba(249,115,22,0.28)',
  orangeBright: '#fb923c',
  text:      '#f8f8ff',
  textMuted: '#6b6b85',
  textDim:   '#2e2e3e',
  red:       '#ef4444',
  green:     '#22c55e',
  border:    'rgba(255,255,255,0.06)',
  tabBar:    'rgba(8,8,12,0.95)',
};

// ── Seed history ─────────────────────────────────────────────
const mkRun = (daysAgo, distKm, durationSec) => {
  const d = new Date(Date.now() - daysAgo * 86400000);
  return {
    id: daysAgo,
    date: d.toISOString(),
    distKm,
    durationSec,
    avgPaceSec: Math.round(durationSec / distKm),
    heartRate: 148 + Math.round(Math.random() * 20 - 10),
    calories: Math.round(distKm * 65),
    splits: Array.from({ length: Math.floor(distKm) }, (_, i) => ({
      km: i + 1,
      paceSec: Math.round(durationSec / distKm + (Math.random() * 30 - 15)),
    })),
  };
};
const HISTORY = [
  mkRun(0,  5.3,  1680),
  mkRun(2,  8.1,  2760),
  mkRun(4,  5.0,  1560),
  mkRun(6,  10.2, 3600),
  mkRun(9,  6.4,  2040),
  mkRun(12, 5.0,  1620),
  mkRun(15, 12.0, 4440),
];

// ── Formatters ───────────────────────────────────────────────
const pad2 = n => String(Math.floor(n)).padStart(2,'0');
function fmtDuration(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return h > 0 ? `${h}:${pad2(m)}:${pad2(s)}` : `${pad2(m)}:${pad2(s)}`;
}
function fmtPace(secPerKm) {
  if (!secPerKm || secPerKm > 900) return '--:--';
  return `${Math.floor(secPerKm/60)}:${pad2(secPerKm%60)}`;
}
function fmtDist(km) {
  return km < 10 ? km.toFixed(2) : km.toFixed(1);
}
function fmtDate(iso) {
  const d = new Date(iso);
  const today = new Date();
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7)  return d.toLocaleDateString([], { weekday:'long' });
  return d.toLocaleDateString([], { month:'short', day:'numeric' });
}

// ── Icons ────────────────────────────────────────────────────
const Ic = {
  home:    c => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  run:     c => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="2"/><path d="M14.5 9.5L16 12l-3 1-2 4H9l2-4.5L9 10l2-2 1.5 1.5z"/><path d="M9 18l-1 3M15 17l1 3"/></svg>,
  history: c => <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  profile: c => <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  chevR:   c => <svg width="7" height="12" viewBox="0 0 7 12" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><path d="M1 1l5 5-5 5"/></svg>,
  back:    c => <svg width="11" height="18" viewBox="0 0 11 18" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 1L1 9l8 8"/></svg>,
  pause:   c => <svg width="26" height="26" viewBox="0 0 24 24" fill={c}><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>,
  play:    c => <svg width="26" height="26" viewBox="0 0 24 24" fill={c}><polygon points="5 3 19 12 5 21"/></svg>,
  stop:    c => <svg width="22" height="22" viewBox="0 0 24 24" fill={c}><rect x="3" y="3" width="18" height="18" rx="2"/></svg>,
  flame:   c => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><path d="M8.5 14.5A5.5 5.5 0 0019 10c0-5.5-5-7-8-10-.5 3-2.5 5.5-5 7a5.5 5.5 0 002.5 7.5z"/></svg>,
  heart:   c => <svg width="15" height="15" viewBox="0 0 24 24" fill={c}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
  bolt:    c => <svg width="14" height="14" viewBox="0 0 24 24" fill={c}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  map:     c => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>,
};

// ── Tab Bar ──────────────────────────────────────────────────
function TabBar({ tab, setTab, onStartRun }) {
  const tabs = [
    { id:'home',    label:'Home',    icon: Ic.home    },
    { id:'run',     label:'Run',     icon: Ic.run     },
    { id:'history', label:'History', icon: Ic.history },
    { id:'profile', label:'You',     icon: Ic.profile },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0, height:82,
      display:'flex', alignItems:'flex-start', paddingTop:8,
      background:C.tabBar, backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)',
      borderTop:`1px solid ${C.border}`, zIndex:100,
    }}>
      {tabs.map(t => {
        const active = tab === t.id;
        const isRun = t.id === 'run';
        return (
          <button
            key={t.id}
            onClick={() => isRun ? onStartRun() : setTab(t.id)}
            style={{
              flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3,
              background:'none', border:'none', cursor:'pointer', padding:'4px 0',
              color: active ? C.orange : C.textMuted,
            }}
          >
            {isRun
              ? <div style={{ width:48, height:48, borderRadius:'50%', background:C.orange, display:'flex', alignItems:'center', justifyContent:'center', marginTop:-20, boxShadow:`0 4px 20px rgba(249,115,22,0.5)` }}>
                  {Ic.run('#fff')}
                </div>
              : t.icon(active ? C.orange : C.textMuted)
            }
            {!isRun && <span style={{ fontSize:10, fontWeight: active?700:500 }}>{t.label}</span>}
          </button>
        );
      })}
    </div>
  );
}

// ── Home Screen ──────────────────────────────────────────────
function HomeScreen({ history, onStartRun, onSelectRun }) {
  const thisWeek = history.filter(r => (Date.now() - new Date(r.date)) / 86400000 < 7);
  const weekDist = thisWeek.reduce((a,r) => a + r.distKm, 0);
  const weekTime = thisWeek.reduce((a,r) => a + r.durationSec, 0);
  const streak = 3; // demo value

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:82 }}>
      <div style={{ height:60 }}/>
      {/* Greeting */}
      <div style={{ padding:'16px 20px 20px' }}>
        <div style={{ fontSize:13, color:C.textMuted, fontWeight:500, marginBottom:4 }}>Good morning</div>
        <div style={{ fontSize:30, fontWeight:800, color:C.text, letterSpacing:-0.7 }}>Let's run 🏃</div>
      </div>

      {/* Weekly summary card */}
      <div style={{ margin:'0 16px 20px', background:`linear-gradient(135deg, #1a1008 0%, #0f0a04 100%)`, border:`1px solid ${C.orangeBorder}`, borderRadius:22, padding:'20px 20px' }}>
        <div style={{ fontSize:12, fontWeight:700, color:C.orange, textTransform:'uppercase', letterSpacing:0.8, marginBottom:14 }}>This week</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:0 }}>
          {[
            { label:'Distance', value:`${fmtDist(weekDist)}`, unit:'km' },
            { label:'Time',     value: weekTime > 3600 ? `${Math.floor(weekTime/3600)}h ${Math.floor((weekTime%3600)/60)}m` : `${Math.floor(weekTime/60)}m`, unit:'' },
            { label:'Runs',     value: thisWeek.length, unit:'' },
          ].map((s,i) => (
            <div key={i} style={{ borderLeft: i>0 ? `1px solid ${C.border}` : 'none', paddingLeft: i>0?16:0 }}>
              <div style={{ fontSize:24, fontWeight:800, color:C.text, letterSpacing:-0.5, fontVariantNumeric:'tabular-nums' }}>{s.value}<span style={{ fontSize:13, color:C.textMuted, fontWeight:500, marginLeft:2 }}>{s.unit}</span></div>
              <div style={{ fontSize:12, color:C.textMuted, marginTop:3 }}>{s.label}</div>
            </div>
          ))}
        </div>
        {/* Mini bar chart */}
        <div style={{ marginTop:16, display:'flex', alignItems:'flex-end', gap:5, height:36 }}>
          {['M','T','W','T','F','S','S'].map((d,i) => {
            const h = [0.3, 0.7, 0, 1, 0.4, 0.85, 0][i];
            return (
              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
                <div style={{ width:'100%', height: 28*h || 3, background: h > 0 ? C.orange : C.surface2, borderRadius:4, opacity: h>0?1:0.4 }}/>
                <span style={{ fontSize:9, color:C.textMuted }}>{d}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Start run CTA */}
      <div style={{ padding:'0 16px 20px' }}>
        <button
          onClick={onStartRun}
          style={{ width:'100%', height:62, borderRadius:20, background:C.orange, border:'none', cursor:'pointer', fontSize:17, fontWeight:800, color:'#fff', letterSpacing:-0.2, boxShadow:`0 6px 24px rgba(249,115,22,0.35)` }}
        >
          Start a Run
        </button>
      </div>

      {/* Recent */}
      <div style={{ padding:'0 16px' }}>
        <div style={{ fontSize:12, fontWeight:700, color:C.textMuted, textTransform:'uppercase', letterSpacing:0.8, padding:'0 4px 10px' }}>Recent</div>
        <div style={{ background:C.surface, borderRadius:18, overflow:'hidden', border:`1px solid ${C.border}` }}>
          {history.slice(0,3).map((run,i) => (
            <div
              key={run.id}
              onClick={() => onSelectRun(run)}
              style={{ display:'flex', alignItems:'center', padding:'14px 16px', borderBottom: i<2 ? `1px solid ${C.border}` : 'none', cursor:'pointer', gap:14 }}
            >
              <div style={{ width:40, height:40, borderRadius:12, background:C.orangeDim, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                {Ic.run(C.orange)}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:15, fontWeight:600, color:C.text }}>{fmtDist(run.distKm)} km</div>
                <div style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>{fmtDate(run.date)} · {fmtDuration(run.durationSec)}</div>
              </div>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontSize:14, fontWeight:600, color:C.text, fontVariantNumeric:'tabular-nums' }}>{fmtPace(run.avgPaceSec)}</div>
                <div style={{ fontSize:11, color:C.textMuted }}>/ km</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Active Run Screen ────────────────────────────────────────
function ActiveRunScreen({ onFinish, onDiscard }) {
  const [elapsed,  setElapsed]  = useState(0);
  const [running,  setRunning]  = useState(true);
  const [dist,     setDist]     = useState(0);
  const [showStop, setShowStop] = useState(false);
  const tickRef = useRef(null);

  // Simulate distance accumulating
  useEffect(() => {
    if (!running) return;
    tickRef.current = setInterval(() => {
      setElapsed(e => e + 1);
      setDist(d => d + (0.0028 + Math.random() * 0.0008)); // ~4:30 min/km
    }, 1000);
    return () => clearInterval(tickRef.current);
  }, [running]);

  const pace = dist > 0 ? elapsed / dist : 0;
  const heartRate = 142 + Math.round(Math.sin(elapsed / 30) * 12);
  const calories  = Math.round(dist * 65);

  const MetricBox = ({ value, unit, label, accent }) => (
    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
      <div style={{ fontSize:13, fontWeight:600, color: accent||C.orange, display:'flex', alignItems:'baseline', gap:3, fontVariantNumeric:'tabular-nums' }}>
        <span style={{ fontSize:22, fontWeight:800, color:C.text }}>{value}</span>
        <span style={{ fontSize:12, color:C.textMuted }}>{unit}</span>
      </div>
      <div style={{ fontSize:11, color:C.textMuted, textTransform:'uppercase', letterSpacing:0.6, fontWeight:600 }}>{label}</div>
    </div>
  );

  return (
    <div style={{ height:'100%', background:C.bg, display:'flex', flexDirection:'column' }}>
      <div style={{ height:60 }}/>

      {/* Header */}
      <div style={{ padding:'8px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ fontSize:13, fontWeight:600, color: running ? C.orange : C.textMuted, display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:7, height:7, borderRadius:'50%', background: running ? C.orange : C.textMuted, animation: running ? 'pulse 1.4s ease-in-out infinite' : 'none' }}/>
          {running ? 'RUNNING' : 'PAUSED'}
        </div>
        <button onClick={() => setShowStop(true)} style={{ background:'none', border:'none', cursor:'pointer', color:C.textMuted, fontSize:13, fontWeight:600 }}>Stop</button>
      </div>

      {/* Big timer */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 20px' }}>
        <div style={{ fontSize:72, fontWeight:900, color:C.text, letterSpacing:-3, fontVariantNumeric:'tabular-nums', lineHeight:1 }}>
          {fmtDuration(elapsed)}
        </div>
        <div style={{ fontSize:14, color:C.textMuted, marginTop:8, fontWeight:500 }}>Elapsed time</div>

        {/* Distance */}
        <div style={{ marginTop:32, textAlign:'center' }}>
          <div style={{ fontSize:56, fontWeight:900, color:C.orange, letterSpacing:-2, fontVariantNumeric:'tabular-nums', lineHeight:1 }}>
            {fmtDist(dist)}
          </div>
          <div style={{ fontSize:16, color:C.textMuted, marginTop:4, fontWeight:600, textTransform:'uppercase', letterSpacing:0.8 }}>km</div>
        </div>

        {/* Secondary metrics */}
        <div style={{ width:'100%', display:'flex', gap:0, marginTop:36, background:C.surface, borderRadius:20, padding:'16px 0', border:`1px solid ${C.border}` }}>
          <MetricBox value={fmtPace(pace)} unit="/km" label="Pace"/>
          <div style={{ width:1, background:C.border, alignSelf:'stretch' }}/>
          <MetricBox value={heartRate} unit="bpm" label="Heart rate" accent={C.red}/>
          <div style={{ width:1, background:C.border, alignSelf:'stretch' }}/>
          <MetricBox value={calories} unit="cal" label="Calories" accent={C.orangeBright}/>
        </div>
      </div>

      {/* Controls */}
      <div style={{ padding:'0 32px 100px', display:'flex', justifyContent:'center', alignItems:'center', gap:24 }}>
        <button
          onClick={() => setRunning(r => !r)}
          style={{
            width:76, height:76, borderRadius:'50%', border:'none', cursor:'pointer',
            background: running ? C.surface2 : C.orange,
            display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow: running ? 'none' : `0 6px 24px rgba(249,115,22,0.4)`,
            transition:'all 0.2s',
          }}
        >
          {running ? Ic.pause(C.text) : Ic.play(C.text)}
        </button>
      </div>

      {/* Stop confirm */}
      {showStop && (
        <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'flex-end', zIndex:200 }}>
          <div style={{ width:'100%', background:C.surface, borderRadius:'28px 28px 0 0', padding:'24px 20px 48px' }}>
            <div style={{ fontSize:20, fontWeight:800, color:C.text, marginBottom:6 }}>End this run?</div>
            <div style={{ fontSize:14, color:C.textMuted, marginBottom:24 }}>{fmtDist(dist)} km · {fmtDuration(elapsed)}</div>
            <button onClick={() => { setRunning(false); onFinish({ distKm:dist, durationSec:elapsed, avgPaceSec:pace, heartRate, calories }); }} style={{ width:'100%', height:54, borderRadius:16, background:C.orange, border:'none', cursor:'pointer', fontSize:16, fontWeight:700, color:'#fff', marginBottom:10 }}>Save Run</button>
            <button onClick={() => setShowStop(false)} style={{ width:'100%', height:54, borderRadius:16, background:'none', border:`1px solid ${C.border}`, cursor:'pointer', fontSize:16, fontWeight:600, color:C.text }}>Keep Going</button>
          </div>
        </div>
      )}
      <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }`}</style>
    </div>
  );
}

// ── Run Summary Screen ───────────────────────────────────────
function SummaryScreen({ run, onDone, isNew }) {
  const StatRow = ({ icon, label, value, unit }) => (
    <div style={{ display:'flex', alignItems:'center', gap:14, padding:'13px 16px', borderBottom:`1px solid ${C.border}` }}>
      <span style={{ color:C.orange, display:'inline-flex', width:20, justifyContent:'center' }}>{icon}</span>
      <span style={{ flex:1, fontSize:15, color:C.textMuted }}>{label}</span>
      <span style={{ fontSize:16, fontWeight:700, color:C.text, fontVariantNumeric:'tabular-nums' }}>{value}</span>
      {unit && <span style={{ fontSize:13, color:C.textMuted, minWidth:28 }}>{unit}</span>}
    </div>
  );

  return (
    <div style={{ height:'100%', overflowY:'auto', background:C.bg }}>
      <div style={{ height:60 }}/>
      <div style={{ padding:'12px 20px 20px', display:'flex', alignItems:'center', gap:14 }}>
        <button onClick={onDone} style={{ background:'none', border:'none', cursor:'pointer', color:C.orange, display:'flex', alignItems:'center', gap:6, fontSize:16, fontWeight:500, padding:0 }}>
          {Ic.back(C.orange)} {isNew ? 'Done' : 'Back'}
        </button>
      </div>

      {/* Hero */}
      <div style={{ margin:'0 16px 24px', background:`linear-gradient(135deg, #1a1008, #0f0a04)`, border:`1px solid ${C.orangeBorder}`, borderRadius:24, padding:'24px 20px', textAlign:'center' }}>
        {isNew && <div style={{ fontSize:12, fontWeight:700, color:C.orange, textTransform:'uppercase', letterSpacing:0.8, marginBottom:12 }}>Run complete 🎉</div>}
        <div style={{ fontSize:15, color:C.textMuted, marginBottom:4 }}>{fmtDate(run.date)}</div>
        <div style={{ fontSize:60, fontWeight:900, color:C.text, letterSpacing:-2, fontVariantNumeric:'tabular-nums', lineHeight:1 }}>{fmtDist(run.distKm)}</div>
        <div style={{ fontSize:16, color:C.orange, fontWeight:700, marginTop:4, textTransform:'uppercase', letterSpacing:0.8 }}>km</div>
        <div style={{ display:'flex', justifyContent:'center', gap:32, marginTop:18 }}>
          <div>
            <div style={{ fontSize:22, fontWeight:800, color:C.text, fontVariantNumeric:'tabular-nums' }}>{fmtDuration(run.durationSec)}</div>
            <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>Duration</div>
          </div>
          <div>
            <div style={{ fontSize:22, fontWeight:800, color:C.text, fontVariantNumeric:'tabular-nums' }}>{fmtPace(run.avgPaceSec)}</div>
            <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>Avg pace / km</div>
          </div>
        </div>
      </div>

      {/* Stats */}
      <div style={{ margin:'0 16px 20px', background:C.surface, borderRadius:20, overflow:'hidden', border:`1px solid ${C.border}` }}>
        <StatRow icon={Ic.heart(C.red)}   label="Avg heart rate" value={run.heartRate}  unit="bpm"/>
        <StatRow icon={Ic.flame(C.orange)} label="Calories"       value={run.calories}   unit="cal"/>
        <StatRow icon={Ic.bolt(C.orange)}  label="Avg pace"       value={fmtPace(run.avgPaceSec)} unit="/km"/>
        <div style={{ display:'flex', alignItems:'center', gap:14, padding:'13px 16px' }}>
          <span style={{ color:C.orange, display:'inline-flex', width:20, justifyContent:'center' }}>{Ic.map(C.orange)}</span>
          <span style={{ flex:1, fontSize:15, color:C.textMuted }}>Splits</span>
        </div>
        {run.splits?.map((s,i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', padding:'10px 16px 10px 50px', borderTop:`1px solid ${C.border}` }}>
            <span style={{ flex:1, fontSize:14, color:C.textMuted }}>km {s.km}</span>
            <span style={{ fontSize:14, fontWeight:600, color: s.paceSec < run.avgPaceSec ? C.green : C.textMuted, fontVariantNumeric:'tabular-nums' }}>{fmtPace(s.paceSec)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── History Screen ───────────────────────────────────────────
function HistoryScreen({ history, onSelectRun }) {
  const totalDist = history.reduce((a,r) => a+r.distKm, 0);
  const totalRuns = history.length;
  const bestPace  = Math.min(...history.map(r => r.avgPaceSec));

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:82 }}>
      <div style={{ height:60 }}/>
      <div style={{ padding:'16px 20px 20px' }}>
        <div style={{ fontSize:30, fontWeight:800, color:C.text, letterSpacing:-0.7 }}>History</div>
      </div>

      {/* Totals */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, padding:'0 16px 20px' }}>
        {[
          { label:'Total km', value: fmtDist(totalDist) },
          { label:'Runs',     value: totalRuns           },
          { label:'Best pace', value: fmtPace(bestPace)  },
        ].map(s => (
          <div key={s.label} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:16, padding:'14px 12px' }}>
            <div style={{ fontSize:20, fontWeight:800, color:C.orange, letterSpacing:-0.5, fontVariantNumeric:'tabular-nums' }}>{s.value}</div>
            <div style={{ fontSize:12, color:C.textMuted, marginTop:4 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Run list */}
      <div style={{ padding:'0 16px' }}>
        <div style={{ background:C.surface, borderRadius:20, overflow:'hidden', border:`1px solid ${C.border}` }}>
          {history.map((run, i) => (
            <div
              key={run.id}
              onClick={() => onSelectRun(run)}
              style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 16px', borderBottom: i<history.length-1?`1px solid ${C.border}`:'none', cursor:'pointer' }}
            >
              <div style={{ width:44, height:44, borderRadius:14, background:C.orangeDim, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                {Ic.run(C.orange)}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:15, fontWeight:700, color:C.text }}>{fmtDist(run.distKm)} km</div>
                <div style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>{fmtDate(run.date)}</div>
              </div>
              <div style={{ textAlign:'right', marginRight:6 }}>
                <div style={{ fontSize:14, fontWeight:600, color:C.text, fontVariantNumeric:'tabular-nums' }}>{fmtPace(run.avgPaceSec)}<span style={{ fontSize:11, color:C.textMuted }}>/km</span></div>
                <div style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>{fmtDuration(run.durationSec)}</div>
              </div>
              {Ic.chevR(C.textDim)}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Profile Screen ───────────────────────────────────────────
function ProfileScreen({ history }) {
  const totalKm   = history.reduce((a,r) => a+r.distKm, 0);
  const totalRuns = history.length;
  const totalTime = history.reduce((a,r) => a+r.durationSec, 0);

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:82 }}>
      <div style={{ height:60 }}/>
      <div style={{ padding:'16px 20px 24px', display:'flex', alignItems:'center', gap:16 }}>
        <div style={{ width:64, height:64, borderRadius:'50%', background:`linear-gradient(135deg, ${C.orange}, #c2410c)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:26 }}>🏃</div>
        <div>
          <div style={{ fontSize:22, fontWeight:800, color:C.text, letterSpacing:-0.4 }}>Runner</div>
          <div style={{ fontSize:13, color:C.textMuted, marginTop:2 }}>Member since 2024</div>
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, padding:'0 16px 24px' }}>
        {[
          { label:'Total distance', value:`${fmtDist(totalKm)} km` },
          { label:'Total runs',     value: totalRuns              },
          { label:'Total time',     value:`${Math.floor(totalTime/3600)}h ${Math.floor((totalTime%3600)/60)}m` },
          { label:'Avg distance',   value:`${fmtDist(totalKm/totalRuns)} km` },
        ].map(s => (
          <div key={s.label} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:18, padding:'16px' }}>
            <div style={{ fontSize:22, fontWeight:800, color:C.orange, letterSpacing:-0.4, fontVariantNumeric:'tabular-nums' }}>{s.value}</div>
            <div style={{ fontSize:12, color:C.textMuted, marginTop:4 }}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ padding:'0 16px' }}>
        <div style={{ fontSize:12, fontWeight:700, color:C.textMuted, textTransform:'uppercase', letterSpacing:0.8, padding:'0 4px 10px' }}>Settings</div>
        <div style={{ background:C.surface, borderRadius:18, overflow:'hidden', border:`1px solid ${C.border}` }}>
          {['Units', 'Notifications', 'Linked Devices', 'Privacy'].map((item, i, arr) => (
            <div key={item} style={{ display:'flex', alignItems:'center', padding:'15px 16px', borderBottom: i<arr.length-1?`1px solid ${C.border}`:'none', cursor:'pointer', gap:12 }}>
              <span style={{ flex:1, fontSize:16, color:C.text }}>{item}</span>
              {Ic.chevR(C.textMuted)}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────
function StrideApp() {
  const [tab,         setTab]         = useState('home');
  const [screen,      setScreen]      = useState(null); // 'run' | 'summary'
  const [activeRun,   setActiveRun]   = useState(null);
  const [selectedRun, setSelectedRun] = useState(null);
  const [history,     setHistory]     = useState(HISTORY);

  const startRun = () => setScreen('run');

  const finishRun = (runData) => {
    const newRun = {
      id: Date.now(),
      date: new Date().toISOString(),
      splits: [],
      ...runData,
    };
    setHistory(h => [newRun, ...h]);
    setActiveRun(newRun);
    setScreen('summary-new');
  };

  return (
    <div style={{ height:'100%', position:'relative', background:C.bg, overflow:'hidden' }}>
      {/* Active run */}
      {screen === 'run' && (
        <div style={{ position:'absolute', inset:0, zIndex:50, background:C.bg }}>
          <ActiveRunScreen onFinish={finishRun} onDiscard={() => setScreen(null)}/>
        </div>
      )}

      {/* Post-run summary */}
      {screen === 'summary-new' && activeRun && (
        <div style={{ position:'absolute', inset:0, zIndex:50, background:C.bg }}>
          <SummaryScreen run={activeRun} isNew onDone={() => { setScreen(null); setTab('history'); }}/>
        </div>
      )}

      {/* Selected run detail */}
      {selectedRun && (
        <div style={{ position:'absolute', inset:0, zIndex:50, background:C.bg }}>
          <SummaryScreen run={selectedRun} onDone={() => setSelectedRun(null)}/>
        </div>
      )}

      {/* Tab screens */}
      {tab === 'home'    && <HomeScreen    history={history} onStartRun={startRun} onSelectRun={r => setSelectedRun(r)}/>}
      {tab === 'history' && <HistoryScreen history={history} onSelectRun={r => setSelectedRun(r)}/>}
      {tab === 'profile' && <ProfileScreen history={history}/>}

      <TabBar tab={tab} setTab={setTab} onStartRun={startRun}/>
    </div>
  );
}

// ── Tweaks + Root ─────────────────────────────────────────────
const STRIDE_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#f97316"
}/*EDITMODE-END*/;

function Root() {
  const [showTweaks, setShowTweaks] = useState(false);
  const [tweaks, setTweaks] = useState(STRIDE_TWEAK_DEFAULTS);

  useEffect(() => {
    const h = e => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', background:'#050508', padding:24 }}>
      <IOSDevice dark width={393} height={852}>
        <StrideApp/>
      </IOSDevice>

      {showTweaks && (
        <div style={{ position:'fixed', bottom:24, right:24, background:'#141420', border:'1px solid rgba(255,255,255,0.08)', borderRadius:22, padding:20, width:220, zIndex:9999, boxShadow:'0 12px 40px rgba(0,0,0,0.6)' }}>
          <div style={{ fontSize:11, fontWeight:800, color:'#6b6b85', textTransform:'uppercase', letterSpacing:1, marginBottom:14 }}>Tweaks</div>
          <div style={{ fontSize:11, color:'#6b6b85', fontWeight:700, textTransform:'uppercase', letterSpacing:0.6, marginBottom:8 }}>Accent Color</div>
          {[['#f97316','Orange'],['#ef4444','Red'],['#38bdf8','Sky Blue'],['#a78bfa','Purple']].map(([color,label]) => (
            <button key={color} onClick={() => { setTweaks(t=>({...t,accentColor:color})); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:color}},'*'); }} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'8px 10px', borderRadius:10, border:'none', background: tweaks.accentColor===color?'rgba(255,255,255,0.06)':'transparent', cursor:'pointer', marginBottom:3 }}>
              <div style={{ width:16, height:16, borderRadius:'50%', background:color, flexShrink:0 }}/>
              <span style={{ fontSize:14, color: tweaks.accentColor===color?'#f8f8ff':'#6b6b85', fontWeight: tweaks.accentColor===color?600:400 }}>{label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
